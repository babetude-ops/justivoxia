<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustiVoxia - Chatbot</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background-color: #0f0f1a; color: white; display: flex; flex-direction: column; height: 100vh; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background-color: #16213e; }
        nav h1 { color: #4e9af1; font-size: 28px; }
        nav a { color: white; text-decoration: none; font-size: 16px; }
        nav a:hover { color: #4e9af1; }
        .chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; width: 100%; margin: 30px auto; padding: 0 20px; }
        .chat-title { text-align: center; margin-bottom: 20px; }
        .chat-title h2 { color: #4e9af1; font-size: 28px; }
        .chat-title p { color: #aaaaaa; margin-top: 5px; }
        .messages { flex: 1; background-color: #16213e; border-radius: 15px; padding: 20px; overflow-y: auto; min-height: 400px; max-height: 400px; display: flex; flex-direction: column; gap: 15px; }
        .message { display: flex; gap: 10px; align-items: flex-start; }
        .message.user { flex-direction: row-reverse; }
        .message .avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .message.bot .avatar { background-color: #4e9af1; }
        .message.user .avatar { background-color: #357abd; }
        .message .text { background-color: #0f0f1a; padding: 12px 16px; border-radius: 15px; max-width: 70%; font-size: 15px; line-height: 1.5; }
        .message.user .text { background-color: #4e9af1; }
        .input-area { display: flex; gap: 10px; margin-top: 20px; }
        .input-area input { flex: 1; padding: 15px 20px; border-radius: 30px; border: none; background-color: #16213e; color: white; font-size: 16px; outline: none; }
        .input-area input::placeholder { color: #aaaaaa; }
        .input-area button { background-color: #4e9af1; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-size: 16px; cursor: pointer; }
        .input-area button:hover { background-color: #357abd; }
    </style>
</head>
<body>
    <nav>
        <h1>JustiVoxia</h1>
        <a href="/">← Retour à l'accueil</a>
    </nav>
    <div class="chat-container">
        <div class="chat-title">
            <h2>🤖 Assistant JustiVoxia</h2>
            <p>Posez votre question sur le droit du travail ou les visas</p>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">
                <div class="avatar">🤖</div>
                <div class="text">Bonjour ! Je suis JustiVoxia, votre assistant juridique. Comment puis-je vous aider aujourd'hui ?</div>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Posez votre question ici..." />
            <button onclick="envoyerMessage()">Envoyer</button>
        </div>
    </div>
    <script>
        async function envoyerMessage() {
            const input = document.getElementById("userInput");
            const messages = document.getElementById("messages");
            const question = input.value.trim();
            if (question === "") return;
            messages.innerHTML += `
                <div class="message user">
                    <div class="avatar">👤</div>
                    <div class="text">${question}</div>
                </div>
            `;
            input.value = "";
            messages.scrollTop = messages.scrollHeight;
            messages.innerHTML += `
                <div class="message bot" id="typing">
                    <div class="avatar">🤖</div>
                    <div class="text">⏳ En train de répondre...</div>
                </div>
            `;
            const reponse = await obtenirReponse(question);
            document.getElementById("typing").remove();
            messages.innerHTML += `
                <div class="message bot">
                    <div class="avatar">🤖</div>
                    <div class="text">${reponse}</div>
                </div>
            `;
            messages.scrollTop = messages.scrollHeight;
        }
        async function obtenirReponse(question) {
            const response = await fetch("/message", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question: question })
            });
            const data = await response.json();
            return data.reponse;
        }
        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") envoyerMessage();
        });
    </script>
</body>
</html>
